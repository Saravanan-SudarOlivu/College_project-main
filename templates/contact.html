<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact Us | S4learnHub</title>
<style>
:root {
  --primary: #38bdf8;
  --secondary: #818cf8;
  --bg: #030712;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text: #f8fafc;
}

/* Base Styles */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', system-ui, sans-serif; }

body { 
    background: var(--bg); 
    color: var(--text); 
    overflow-x: hidden;
    background-image: 
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(129, 140, 248, 0.05) 0%, transparent 40%);
    min-height: 100vh;
}

.dynamic-bg { position: fixed; inset: 0; z-index: -2; }
.dynamic-bg::before { content: ""; position: absolute; inset: -8%; background: radial-gradient(1200px 800px at 25% 35%, rgba(56,189,248,0.08), transparent 60%), radial-gradient(900px 700px at 75% 65%, rgba(129,140,248,0.08), transparent 60%), conic-gradient(from 180deg at 50% 50%, rgba(56,189,248,0.06), rgba(129,140,248,0.06), rgba(52,211,153,0.05), rgba(56,189,248,0.06)); filter: blur(2px); animation: bgShift 18s linear infinite; }
.dynamic-bg::after { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 40%); animation: glowPulse 6s ease-in-out infinite alternate; }
.fshape { position: fixed; width: 280px; height: 280px; border-radius: 40% 60% 50% 50% / 40% 60% 50% 60%; filter: blur(50px); opacity: 0.12; z-index: -1; animation: floatBlob 22s infinite ease-in-out; }
.fshape.one { background: #38bdf8; top: 14%; left: 10%; }
.fshape.two { background: #818cf8; bottom: 12%; right: 8%; animation-delay: -5s; }
.fshape.three { background: #34d399; top: 68%; left: 72%; animation-delay: -10s; }
@keyframes bgShift { 0% { transform: translate3d(0,0,0) scale(1); } 50% { transform: translate3d(20px,-20px,0) scale(1.02); } 100% { transform: translate3d(0,0,0) scale(1); } }
@keyframes glowPulse { 0% { opacity: 0.25; } 100% { opacity: 0.55; } }
@keyframes floatBlob { 0%,100% { transform: translateY(0) scale(1) rotate(0deg); } 33% { transform: translateY(-30px) scale(1.05) rotate(120deg); } 66% { transform: translateY(15px) scale(0.98) rotate(240deg); } }
/* --- Navigation --- */
header {
  position: sticky; top: 0; z-index: 1000;
  background: rgba(3, 7, 18, 0.8);
  backdrop-filter: blur(12px); padding: 20px 50px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--glass-border);
}

.logo { 
    font-size: 28px; font-weight: 900; 
    background: linear-gradient(to right, var(--primary), var(--secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
}

nav a { 
    margin-left: 25px; text-decoration: none; color: var(--text); 
    font-size: 14px; font-weight: 500; transition: 0.3s; opacity: 0.7;
}

nav a:hover { opacity: 1; color: var(--primary); }

/* --- Hero Section --- */
.contact-hero {
    text-align: center; padding: 100px 20px 40px;
}

.contact-hero h1 { 
    font-size: 56px; margin-bottom: 20px; letter-spacing: -1px; 
    background: linear-gradient(135deg, var(--primary), var(--secondary)); 
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    opacity: 0; transform: translateY(30px); animation: fadeInUp 0.8s forwards;
    position: relative;
}
.contact-hero h1::after {
    content: ""; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    width: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--secondary));
    animation: underlineExpand 1s 0.6s forwards ease-out;
}

/* --- Contact Grid --- */
.wrapper {
    max-width: 1100px; margin: 0 auto; padding: 40px 20px;
    display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px;
}

.contact-info, .contact-form {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 32px; padding: 50px;
    backdrop-filter: blur(20px);
    opacity: 0; transform: translateY(30px);
    transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    position: relative;
}

.reveal { opacity: 1; transform: translateY(0); }

/* --- Info Blocks --- */
.info-box { margin-bottom: 35px; transition: 0.3s; }
.info-box:hover { transform: translateX(10px); }

.icon-wrap {
    width: 50px; height: 50px; background: rgba(56, 189, 248, 0.1);
    border-radius: 14px; display: flex; align-items: center;
    justify-content: center; color: var(--primary); font-size: 24px;
    margin-bottom: 15px;
}

/* --- Form Design --- */
.input-field {
    width: 100%; padding: 16px; border-radius: 16px;
    background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
    color: white; margin-bottom: 20px; outline: none; transition: 0.3s;
}

.input-field:focus {
    border-color: var(--primary);
    background: rgba(56, 189, 248, 0.05);
    box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
}

.submit-btn {
    width: 100%; padding: 18px; border-radius: 16px; border: none;
    background: linear-gradient(45deg, var(--primary), var(--secondary));
    color: white; font-weight: 700; font-size: 16px;
    cursor: pointer; transition: 0.4s;
}

.submit-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(56, 189, 248, 0.4);
}

.contact-info::before, .contact-form::before {
    content: ""; position: absolute; inset: -2px; border-radius: 34px; padding: 2px;
    background: linear-gradient(45deg, rgba(56,189,248,0.2), rgba(129,140,248,0.2));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.4s;
}
.contact-info:hover::before, .contact-form:hover::before { opacity: 1; }
.info-box:hover { transform: translateX(10px) translateY(-2px); }
.submit-btn { position: relative; overflow: hidden; }
.submit-btn::after { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.6s; }
.submit-btn:hover::after { left: 100%; }
.orb { position: fixed; width: 320px; height: 320px; border-radius: 50%; filter: blur(80px); opacity: 0.12; z-index: -1; animation: drift 18s infinite alternate; }
.orb-1 { background: var(--primary); top: -100px; left: -120px; }
.orb-2 { background: var(--secondary); bottom: -120px; right: -120px; animation-delay: -6s; }
@keyframes drift { from { transform: translate(0,0); } to { transform: translate(80px,80px); } }
@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
@keyframes underlineExpand { to { width: 200px; } }
footer { padding: 60px 20px; text-align: center; color: #4b5563; border-top: 1px solid var(--glass-border); }

@media (max-width: 850px) {
    header { padding: 20px; }
    .wrapper { grid-template-columns: 1fr; }
    .contact-hero h1 { font-size: 38px; }
}
</style>
</head>
<body>

<div class="dynamic-bg"></div>
<div class="fshape one"></div>
<div class="fshape two"></div>
<div class="fshape three"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header>
  <a href="index.html" class="logo">S4learnHub</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<div class="contact-hero">
    <h1>Let's Connect.</h1>
    <p style="color: var(--primary); letter-spacing: 1px; font-weight: 600; text-transform: uppercase;">Innovation meets Collaboration</p>
</div>

<div class="wrapper">
    <div class="contact-info">
        <div class="info-box">
            <div class="icon-wrap">📧</div>
            <h4>Email Us</h4>
            <p style="color: #94a3b8;">saravanansmk04@gmail.com</p>
        </div>
        <div class="info-box">
            <div class="icon-wrap">📞</div>
            <h4>Call Anytime</h4>
            <p style="color: #94a3b8;">+91 93607 27794</p>
        </div>
        <div class="info-box">
            <div class="icon-wrap">🌍</div>
            <h4>Headquarters</h4>
            <p style="color: #94a3b8;">Tamil Nadu, India</p>
        </div>
    </div>

    <div class="contact-form">
        <input type="text" class="input-field" placeholder="Full Name">
        <input type="email" class="input-field" placeholder="Email Address">
        <textarea class="input-field" rows="5" placeholder="Your Message..."></textarea>
        <button class="submit-btn">SEND MESSAGE</button>
    </div>
</div>

<footer>
    <p>© 2026 S4learnHub. All rights reserved.</p>
</footer>

<script>
// Staggered Reveal Animation
const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, index) => {
        if (entry.isIntersecting) {
            setTimeout(() => {
                entry.target.classList.add('reveal');
            }, index * 200); 
        }
    });
}, { threshold: 0.1 });

document.querySelectorAll('.contact-info, .contact-form').forEach(el => observer.observe(el));
</script>

</body>
</html>
