<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S4learnHub | The Future of Learning</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --primary: #38bdf8;
  --secondary: #818cf8;
  --accent: #34d399;
  --bg: #030712;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text: #f8fafc;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', system-ui, sans-serif; }

body { 
    background: var(--bg); 
    color: var(--text); 
    overflow-x: hidden;
    background-image: 
        radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(129, 140, 248, 0.08) 0%, transparent 40%);
}

    .dynamic-bg {
      position: fixed;
      inset: 0;
      z-index: -2;
    }                                                          

    .dynamic-bg::before {
      content: "";
      position: absolute;
      inset: -8%;
      background: radial-gradient(1200px 800px at 25% 35%, rgba(56, 189, 248, 0.08), transparent 60%), radial-gradient(900px 700px at 75% 65%, rgba(129, 140, 248, 0.08), transparent 60%), conic-gradient(from 180deg at 50% 50%, rgba(56, 189, 248, 0.06), rgba(129, 140, 248, 0.06), rgba(52, 211, 153, 0.05), rgba(56, 189, 248, 0.06));
      filter: blur(2px);
      animation: bgShift 18s linear infinite;
    }

    @keyframes bgShift {
      0% {
        transform: rotate(0deg) scale(1);
      }

      50% {
        transform: rotate(3deg) scale(1.02);
      }

      100% {
        transform: rotate(0deg) scale(1);
      }
    }

    .fshape {
      position: fixed;
      filter: blur(70px);
      z-index: -1;
      opacity: 0.25;
      animation: floatBlob 12s infinite ease-in-out alternate;
    }

    .fshape-1 {
      top: 10%;
      left: -5%;
      width: 500px;
      height: 500px;
      background: var(--primary);
      border-radius: 40% 60% 70% 30%;
    }

    .fshape-2 {
      bottom: 5%;
      right: -5%;
      width: 600px;
      height: 600px;
      background: var(--secondary);
      border-radius: 60% 40% 30% 70%;
      animation-delay: -5s;
    }

    .fshape-3 {
      top: 40%;
      left: 40%;
      width: 300px;
      height: 300px;
      background: var(--accent);
      border-radius: 50%;
      animation-delay: -8s;
    }

    @keyframes floatBlob {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }

      100% {
        transform: translate(40px, -40px) rotate(15deg);
      }
    }

/* --- Floating Background Orbs --- */
.orb {
    position: fixed; width: 400px; height: 400px; border-radius: 50%;
    filter: blur(80px); opacity: 0.15; z-index: -1; animation: drift 20s infinite alternate;
}
.orb-1 { background: var(--primary); top: -100px; left: -100px; }
.orb-2 { background: var(--secondary); bottom: -100px; right: -100px; animation-delay: -5s; }

@keyframes drift {
    from { transform: translate(0, 0); }
    to { transform: translate(100px, 100px); }
}

/* --- Navigation --- */
header {
  position: sticky; top: 0; z-index: 1000;
  background: rgba(3, 7, 18, 0.8);
  backdrop-filter: blur(12px); padding: 20px 50px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--glass-border);
}

.logo { 
    font-size: 28px; font-weight: 900; 
    background: linear-gradient(to right, var(--primary), var(--secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
}

nav a { 
    margin-left: 25px; text-decoration: none; color: var(--text); 
    font-size: 14px; font-weight: 500; transition: 0.3s; opacity: 0.7;
}

nav a:hover { opacity: 1; color: var(--primary); }

/* --- Hero Section --- */
.hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 40px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  animation: pulse 6s ease-in-out infinite;
  z-index: -1;
}

.hero-content {
  max-width: 1200px;
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 80px;
  align-items: center;
  position: relative;
}

.hero h1 { 
    font-size: 72px; line-height: 1.1; margin-bottom: 25px; font-weight: 800;
    opacity: 0; transform: translateY(40px); 
    animation: fadeInUp 1s 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
}

.hero h1::after {
  content: '';
  position: absolute;
  bottom: -10px; left: 0;
  width: 0; height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  animation: underlineExpand 1.2s 1.2s ease-out forwards;
}

.hero p { 
    font-size: 22px; color: #94a3b8; margin-bottom: 40px; line-height: 1.7;
    opacity: 0; transform: translateY(30px); 
    animation: fadeInUp 1s 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    font-weight: 300;
}

.hero-buttons {
    display: flex; gap: 20px;
    opacity: 0; transform: translateY(30px); 
    animation: fadeInUp 1s 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

.btn {
    padding: 18px 36px; border-radius: 20px; border: none; font-size: 16px;
    font-weight: 700; cursor: pointer; 
    transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    text-decoration: none; display: inline-block;
    position: relative;
    overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.6s;
}

.btn:hover::before {
  left: 100%;
}

.btn-primary { 
  background: linear-gradient(135deg, var(--primary), var(--secondary)); 
  color: #fff; 
  box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4);
}

.btn-secondary { 
  background: var(--glass); 
  border: 1px solid var(--glass-border); 
  color: #fff; 
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

.btn:hover { 
  transform: translateY(-8px) scale(1.08); 
  box-shadow: 0 25px 50px rgba(56, 189, 248, 0.5);
}

.btn:active {
  transform: translateY(-2px) scale(1.02);
}

/* --- Hero Image --- */
.hero-image {
    position: relative; 
    opacity: 0; transform: scale(0.8) rotate(-5deg); 
    animation: zoomRotateIn 1.2s 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));
}

.hero-image::before {
  content: '';
  position: absolute;
  top: -20px; left: -20px; right: -20px; bottom: -20px;
  background: linear-gradient(45deg, var(--primary), var(--secondary));
  border-radius: 40px;
  z-index: -1;
  opacity: 0.3;
  filter: blur(20px);
  animation: glow 3s ease-in-out infinite alternate;
}

.hero-image img {
    width: 100%; border-radius: 32px;
    border: 2px solid var(--glass-border);
    transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.hero-image:hover img {
  transform: scale(1.05) rotate(2deg);
  border-color: var(--primary);
}

/* --- Animations --- */
@keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
}

@keyframes zoomRotateIn {
    0% { opacity: 0; transform: scale(0.8) rotate(-5deg); }
    50% { transform: scale(1.05) rotate(2deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
}

@keyframes pulse {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
}

@keyframes underlineExpand {
    to { width: 100%; }
}

@keyframes glow {
    from { opacity: 0.3; filter: blur(20px); }
    to { opacity: 0.5; filter: blur(30px); }
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
}

@keyframes shimmer {
    0% { background-position: -1000px 0; }
    100% { background-position: 1000px 0; }
}

/* --- Smooth Scroll Behavior --- */
html {
  scroll-behavior: smooth;
}

/* --- Page Transition Effects --- */
.page-transition {
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.page-transition.visible {
  opacity: 1;
  transform: translateY(0);
}

/* --- Scroll Progress Indicator --- */
.scroll-progress {
  position: fixed;
  top: 0;
  left: 0;
  width: 0%;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  z-index: 9999;
  transition: width 0.3s ease;
}

/* --- Parallax Scrolling Elements --- */
.parallax {
  transform: translateY(var(--scroll-y));
  transition: transform 0.1s ease-out;
  will-change: transform;
}

/* --- Staggered Animation for Multiple Elements --- */
.stagger-item {
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.stagger-item.visible {
  opacity: 1;
  transform: translateY(0);
}

/* --- Advanced Hover Effects --- */
.hover-scale {
  transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.hover-scale::before {
  content: '';
  position: absolute;
  top: var(--mouse-y, 50%);
  left: var(--mouse-x, 50%);
  width: 0; height: 0;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
  pointer-events: none;
}

.hover-scale:hover {
  transform: scale(1.05);
  box-shadow: 0 20px 40px rgba(56, 189, 248, 0.3);
}

.hover-scale:hover::before {
  width: 300px;
  height: 300px;
}

/* --- Glass Morphism Hover Effect --- */
.glass-hover {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.glass-hover:hover {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  border-color: var(--primary);
  transform: translateY(-5px);
  box-shadow: 
    0 20px 40px rgba(0, 0, 0, 0.3),
    0 0 0 1px var(--primary);
}

/* --- Gradient Text Hover Effect --- */
.gradient-text-hover {
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  position: relative;
}

.gradient-text-hover::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0;
  width: 0; height: 2px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.gradient-text-hover:hover::after {
  width: 100%;
}

.gradient-text-hover:hover {
  background: linear-gradient(90deg, var(--secondary), var(--primary));
  -webkit-background-clip: text;
  background-clip: text;
}

/* --- 3D Card Hover Effect --- */
.card-3d {
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.card-3d:hover {
  transform: rotateY(5deg) rotateX(5deg) translateZ(10px);
}

.card-3d::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(129, 140, 248, 0.1));
  opacity: 0;
  transition: opacity 0.4s;
  border-radius: inherit;
}

.card-3d:hover::before {
  opacity: 1;
}

/* --- Magnetic Button Effect --- */
.magnetic-btn {
  position: relative;
  overflow: hidden;
  transform-style: preserve-3d;
}

.magnetic-btn .btn-content {
  position: relative;
  z-index: 2;
  transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.magnetic-btn:hover .btn-content {
  transform: translate(var(--tx, 0), var(--ty, 0)) scale(1.1);
}

/* --- Ripple Effect --- */
.ripple {
  position: relative;
  overflow: hidden;
}

.ripple::after {
  content: '';
  position: absolute;
  top: var(--mouse-y, 50%);
  left: var(--mouse-x, 50%);
  width: 0; height: 0;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: ripple 0.6s ease-out;
  pointer-events: none;
}

@keyframes ripple {
  to {
    width: 200px;
    height: 200px;
    opacity: 0;
  }
}

/* --- Glow Border Hover --- */
.glow-border {
  position: relative;
  border: 2px solid transparent;
  background: var(--glass);
  transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.glow-border::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent), var(--primary));
  border-radius: inherit;
  z-index: -1;
  opacity: 0;
  transition: opacity 0.4s;
}

.glow-border:hover::before {
  opacity: 1;
  animation: rotateGradient 3s linear infinite;
}

.glow-border:hover {
  border-color: transparent;
  background: rgba(255, 255, 255, 0.1);
  transform: translateY(-3px);
}

/* --- Gradient Border Animation --- */
.gradient-border {
  position: relative;
  background: var(--bg);
  border-radius: 24px;
  padding: 2px;
}

.gradient-border::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
  border-radius: 26px;
  z-index: -1;
  animation: rotateGradient 3s linear infinite;
}

@keyframes rotateGradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* --- Loading Animation --- */
.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--glass-border);
  border-top: 3px solid var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* --- Particle System --- */
.particles-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: -1;
}

.particle {
  position: absolute;
  background: linear-gradient(45deg, var(--primary), var(--secondary));
  border-radius: 50%;
  opacity: 0.3;
  animation: floatParticle 20s infinite linear;
}

@keyframes floatParticle {
  0% {
    transform: translateY(100vh) translateX(0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 0.3;
  }
  90% {
    opacity: 0.3;
  }
  100% {
    transform: translateY(-100px) translateX(var(--translate-x, 100px)) rotate(360deg);
    opacity: 0;
  }
}

/* --- Animated Gradient Background --- */
.animated-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(45deg, 
    rgba(56, 189, 248, 0.1), 
    rgba(129, 140, 248, 0.1), 
    rgba(52, 211, 153, 0.1)
  );
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  z-index: -2;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* --- Floating Shapes --- */
.floating-shape {
  position: fixed;
  opacity: 0.1;
  filter: blur(40px);
  animation: floatShape 20s infinite ease-in-out;
  z-index: -1;
}

.shape-1 {
  width: 300px; height: 300px;
  background: var(--primary);
  border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
  top: 20%; left: 10%;
  animation-delay: 0s;
}

.shape-2 {
  width: 400px; height: 400px;
  background: var(--secondary);
  border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
  bottom: 30%; right: 15%;
  animation-delay: -5s;
}

.shape-3 {
  width: 250px; height: 250px;
  background: var(--accent);
  border-radius: 50% 50% 50% 50% / 60% 40% 60% 40%;
  top: 60%; left: 70%;
  animation-delay: -10s;
}

@keyframes floatShape {
  0%, 100% { 
    transform: translateY(0px) rotate(0deg); 
  }
  33% { 
    transform: translateY(-30px) rotate(120deg); 
  }
  66% { 
    transform: translateY(20px) rotate(240deg); 
  }
}

/* --- Footer --- */
footer {
  padding: 40px; text-align: center; color: #4b5563;
  border-top: 1px solid var(--glass-border); margin-top: 60px;
}

@media(max-width:1000px){
  .hero-content { grid-template-columns: 1fr; text-align: center; gap: 50px; }
  .hero h1 { font-size: 48px; }
  .hero-buttons { justify-content: center; }
  header { padding: 20px; }
}
</style>
</head>

  <div class="dynamic-bg"></div>
  <div class="fshape fshape-1"></div>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="particles-container"></div>

<header>

  <nav>

      <h1>Learn Smarter with <span>S4learnHub</span></h1>
      <p>The ultimate collaborative platform for modern students. Chat, share, and excel together with real-time EduChat technology.</p>
      <div class="hero-buttons">
        <a href="login.html" class="btn btn-primary">Start Free Trial</a>

      </div>

<script>
// Scroll progress indicator
window.addEventListener('scroll', () => {
  const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
  const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const scrolled = (winScroll / height) * 100;
  document.querySelector('.scroll-progress').style.width = scrolled + '%';
});

// Intersection Observer for scroll animations
const observerOptions = {
  threshold: 0.1,
  rootMargin: '0px 0px -50px 0px'
};

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      // Stagger animation for multiple elements
      if (entry.target.classList.contains('stagger-container')) {
        const items = entry.target.querySelectorAll('.stagger-item');
        items.forEach((item, index) => {
          item.style.transitionDelay = `${index * 0.1}s`;
          item.classList.add('visible');
        });
      }
    }
  });
}, observerOptions);

// Observe all elements with animation classes
document.querySelectorAll('.page-transition, .stagger-container').forEach(el => {
  observer.observe(el);
});

// Parallax effect
window.addEventListener('scroll', () => {
  const scrolled = window.pageYOffset;
  const parallaxElements = document.querySelectorAll('.parallax');
  
  parallaxElements.forEach(element => {
    const speed = parseFloat(element.getAttribute('data-speed')) || 0.5;
    element.style.setProperty('--scroll-y', (scrolled * speed) + 'px');
  });
});

// Smooth page load animation
document.addEventListener('DOMContentLoaded', () => {
  document.body.classList.add('loaded');
  
  // Add scroll progress element if it doesn't exist
  if (!document.querySelector('.scroll-progress')) {
    const progressBar = document.createElement('div');
    progressBar.className = 'scroll-progress';
    document.body.appendChild(progressBar);
  }
});

// Enhanced hover effects with mouse position tracking
document.querySelectorAll('.btn, .card, .hover-scale').forEach(element => {
  element.addEventListener('mousemove', (e) => {
    const rect = element.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    element.style.setProperty('--mouse-x', `${x}px`);
    element.style.setProperty('--mouse-y', `${y}px`);
  });
});

// Particle System Creation
function createParticles() {
  const container = document.querySelector('.particles-container');
  if (!container) return;
  
  const particleCount = 30;
  
  for (let i = 0; i < particleCount; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    
    // Random properties
    const size = Math.random() * 10 + 5;
    const posX = Math.random() * 100;
    const translateX = (Math.random() - 0.5) * 200;
    const duration = Math.random() * 10 + 15;
    const delay = Math.random() * 20;
    
    particle.style.width = `${size}px`;
    particle.style.height = `${size}px`;
    particle.style.left = `${posX}%`;
    particle.style.setProperty('--translate-x', `${translateX}px`);
    particle.style.animationDuration = `${duration}s`;
    particle.style.animationDelay = `-${delay}s`;
    
    container.appendChild(particle);
  }
}

// Create animated background shapes
function createBackgroundShapes() {
  const shapes = ['shape-1', 'shape-2', 'shape-3'];
  shapes.forEach(shapeClass => {
    const shape = document.createElement('div');
    shape.className = `floating-shape ${shapeClass}`;
    document.body.appendChild(shape);
  });
}

// Create animated gradient background
function createAnimatedBackground() {
  const bg = document.createElement('div');
  bg.className = 'animated-bg';
  document.body.insertBefore(bg, document.body.firstChild);
}

// Initialize all background effects
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  createBackgroundShapes();
  createAnimatedBackground();
});
</script>
